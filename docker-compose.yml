services:
  # Nginx
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
    - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    - .:/var/www/html:ro
    depends_on:
      - app
    networks:
      - laravel-network

  # PHP + Laravel (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-app
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    working_dir: /var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: rightchoiceco_rightchoiceco
      DB_USERNAME: root
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      MONGO_DB_HOST: mongodb
      MONGO_DB_PORT: 27017
      MONGO_DB_DATABASE: rightchoice_chat
      MONGO_DB_USERNAME: ""
      MONGO_DB_PASSWORD: ""
    depends_on:
      - db
      - redis
      - mongodb
    networks:
      - laravel-network

  # Redis (Cache & Session)
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - laravel-network

  # MySQL
  db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: rightchoiceco_rightchoiceco
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - laravel-network

  # MongoDB (Chat Database)
  mongodb:
    image: mongo:7
    container_name: mongodb
    environment:
      MONGO_INITDB_DATABASE: rightchoice_chat
    volumes:
      - mongodata:/data/db
    ports:
      - "27017:27017"
    networks:
      - laravel-network

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: secret
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - laravel-network

  # Mongo Express (MongoDB Web Admin)
  mongo-express:
    image: mongo-express:1
    container_name: mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: secret
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
    networks:
      - laravel-network


networks:
  laravel-network:
    driver: bridge

volumes:
  dbdata:
  mongodata:
